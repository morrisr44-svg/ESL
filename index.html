<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This · That · These · Those</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@500;800&display=swap" rel="stylesheet">
<style>
  :root {
    --this-color: #FF6B6B;
    --that-color: #4ECDC4;
    --these-color: #FFD93D;
    --those-color: #A29BFE;
    --bg: #FFF9F0;
    --card-bg: #ffffff;
    --text: #2D2D2D;
    --correct: #00C896;
    --wrong: #FF6B6B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 2.4rem;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  header h1 span {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 8px;
    margin: 0 2px;
  }
  .w-this  { background: var(--this-color);  color: #fff; }
  .w-that  { background: var(--that-color);  color: #fff; }
  .w-these { background: var(--these-color); color: #2D2D2D; }
  .w-those { background: var(--those-color); color: #fff; }

  .legend {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 14px 0 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    font-weight: 700;
    background: #fff;
    border-radius: 20px;
    padding: 4px 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.07);
  }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 20px;
    max-width: 960px;
    margin: 0 auto 32px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }

  .card-accent {
    height: 6px;
    width: 100%;
  }

  .card-body {
    padding: 20px 20px 22px;
  }

  /* Scene: ground strip — person left, object placed by distance */
  .scene {
    position: relative;
    width: 100%;
    height: 80px;
    margin-bottom: 16px;
    background: linear-gradient(180deg, #f0f4ff 0%, #e2e8f0 100%);
    border-radius: 12px;
    overflow: hidden;
  }

  .scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(0deg,  rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 40px);
  }

  .scene-person {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2rem;
    line-height: 1;
    z-index: 2;
  }

  .scene-line {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    height: 3px;
    border-radius: 2px;
    z-index: 1;
  }

  .scene-line.near {
    left: 52px;
    width: 68px;
    background: repeating-linear-gradient(
      90deg,
      #FF6B6B 0px, #FF6B6B 6px,
      transparent 6px, transparent 12px
    );
  }

  .scene-line.far {
    left: 52px;
    right: 60px;
    background: repeating-linear-gradient(
      90deg,
      #4ECDC4 0px, #4ECDC4 6px,
      transparent 6px, transparent 12px
    );
  }

  .scene-object {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.6rem;
    line-height: 1;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .scene-object.near { left: 126px; }
  .scene-object.far  { right: 10px; }

  .scene-object .emoji-row {
    font-size: 1rem;
    letter-spacing: -3px;
    line-height: 1.1;
  }

  .sentence {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.5;
    text-align: center;
  }

  .blank {
    display: inline-block;
    min-width: 90px;
    border-bottom: 3px solid #ddd;
    padding: 2px 8px;
    text-align: center;
    transition: border-color 0.2s;
    vertical-align: middle;
  }

  .options {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    border: 2.5px solid transparent;
    border-radius: 12px;
    padding: 7px 18px;
    cursor: pointer;
    transition: all 0.15s;
    background: #F4F4F4;
    color: var(--text);
  }

  .btn:hover {
    background: #E8E8E8;
    transform: scale(1.04);
  }

  .btn.selected {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  .btn.correct {
    background: var(--correct);
    color: #fff;
    border-color: var(--correct);
  }

  .btn.wrong {
    background: var(--wrong);
    color: #fff;
    border-color: var(--wrong);
    animation: shake 0.3s;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .feedback {
    text-align: center;
    margin-top: 10px;
    font-weight: 700;
    font-size: 0.95rem;
    min-height: 22px;
    transition: all 0.2s;
  }

  .feedback.correct { color: var(--correct); }
  .feedback.wrong   { color: var(--wrong); }

  .score-bar {
    max-width: 960px;
    margin: 0 auto 28px;
    text-align: center;
  }

  .score-display {
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 10px;
  }

  .progress {
    height: 12px;
    background: #E0E0E0;
    border-radius: 10px;
    overflow: hidden;
    max-width: 400px;
    margin: 0 auto;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--correct), #00E5A0);
    border-radius: 10px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .reset-btn {
    display: block;
    margin: 20px auto 0;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 1rem;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 10px 28px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }

  .reset-btn:hover {
    background: #444;
    transform: scale(1.05);
  }

  .section-label {
    max-width: 960px;
    margin: 0 auto 12px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 2px;
    background: #E0E0E0;
    border-radius: 2px;
  }

  .near-badge, .far-badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .near-badge { background: #FFE5E5; color: #FF6B6B; }
  .far-badge  { background: #E5F8F7; color: #4ECDC4; }
</style>
</head>
<body>

<header>
  <h1>
    <span class="w-this">This</span>
    <span class="w-that">That</span>
    <span class="w-these">These</span>
    <span class="w-those">Those</span>
  </h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--this-color)"></div> this = 1 thing, near</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--that-color)"></div> that = 1 thing, far</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--these-color)"></div> these = many things, near</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--those-color)"></div> those = many things, far</div>
  </div>
</header>

<div class="score-bar">
  <div class="score-display">Score: <span id="score">0</span> / <span id="total">0</span></div>
  <div class="progress"><div class="progress-fill" id="progress-fill"></div></div>
  <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
</div>

<div id="cards-container"></div>

<script>
const questions = [
  // THIS — near, singular
  {
    id: 1, answer: 'this', accent: '#FF6B6B',
    near: true, plural: false,
    emoji: '🍎', label: 'apple',
    sentence: '___ is an apple.',
    hint: '(1 apple, near you)'
  },
  {
    id: 2, answer: 'this', accent: '#FF6B6B',
    near: true, plural: false,
    emoji: '🐶', label: 'dog',
    sentence: '___ is a dog.',
    hint: '(1 dog, next to you)'
  },
  // THAT — far, singular
  {
    id: 3, answer: 'that', accent: '#4ECDC4',
    near: false, plural: false,
    emoji: '🌳', label: 'tree',
    sentence: '___ is a tree.',
    hint: '(1 tree, far away)'
  },
  {
    id: 4, answer: 'that', accent: '#4ECDC4',
    near: false, plural: false,
    emoji: '🚗', label: 'car',
    sentence: '___ is a car.',
    hint: '(1 car, over there)'
  },
  // THESE — near, plural
  {
    id: 5, answer: 'these', accent: '#FFD93D',
    near: true, plural: true,
    emoji: '📚', label: 'books',
    sentence: '___ are books.',
    hint: '(many books, near you)'
  },
  {
    id: 6, answer: 'these', accent: '#FFD93D',
    near: true, plural: true,
    emoji: '🍪', label: 'cookies',
    sentence: '___ are cookies.',
    hint: '(many cookies, right here)'
  },
  // THOSE — far, plural
  {
    id: 7, answer: 'those', accent: '#A29BFE',
    near: false, plural: true,
    emoji: '⭐', label: 'stars',
    sentence: '___ are stars.',
    hint: '(many stars, far away)'
  },
  {
    id: 8, answer: 'those', accent: '#A29BFE',
    near: false, plural: true,
    emoji: '🏠', label: 'houses',
    sentence: '___ are houses.',
    hint: '(many houses, far away)'
  },
  // Mixed extras
  {
    id: 9, answer: 'this', accent: '#FF6B6B',
    near: true, plural: false,
    emoji: '☕', label: 'coffee',
    sentence: '___ is coffee.',
    hint: '(1 cup, near you)'
  },
  {
    id: 10, answer: 'those', accent: '#A29BFE',
    near: false, plural: true,
    emoji: '🐦', label: 'birds',
    sentence: '___ are birds.',
    hint: '(many birds, far away)'
  },
];

const answered = {};
let correctCount = 0;

// Mixed order: this, these, that, this, those, that, these, those, this, those
// No two same answers together — students must think each time
const mixedOrder = [1, 5, 3, 9, 7, 4, 6, 8, 2, 10];

function buildCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'grid';

  mixedOrder.forEach(id => {
    const q = questions.find(x => x.id === id);
    grid.appendChild(buildCard(q));
  });

  container.appendChild(grid);
  updateScore();
}

function buildCard(q) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${q.id}`;

  const dist = q.near ? 'near' : 'far';
  const emojiDisplay = q.plural
    ? `<div class="emoji-row">${q.emoji} ${q.emoji}</div><div class="emoji-row">${q.emoji}</div>`
    : q.emoji;

  const sceneHTML = `
    <div class="scene-person">🧑</div>
    <div class="scene-line ${dist}"></div>
    <div class="scene-object ${dist}">${emojiDisplay}</div>
  `;

  const sentenceHTML = q.sentence.replace('___', `<span class="blank" id="blank-${q.id}">___</span>`);

  card.innerHTML = `
    <div class="card-accent" style="background:${q.accent}"></div>
    <div class="card-body">
      <div class="scene">${sceneHTML}</div>
      <div class="sentence">${sentenceHTML}</div>
      <div style="font-size:0.78rem;color:#aaa;text-align:center;margin-bottom:12px;">${q.hint}</div>
      <div class="options" id="opts-${q.id}">
        ${['this','that','these','those'].map(w => `
          <button class="btn" onclick="checkAnswer(${q.id}, '${w}', this)">${w}</button>
        `).join('')}
      </div>
      <div class="feedback" id="fb-${q.id}"></div>
    </div>
  `;
  return card;
}

function checkAnswer(id, chosen, btn) {
  if (answered[id]) return;
  const q = questions.find(x => x.id === id);
  const fb = document.getElementById(`fb-${id}`);
  const blank = document.getElementById(`blank-${id}`);
  const allBtns = document.querySelectorAll(`#opts-${id} .btn`);

  allBtns.forEach(b => b.disabled = true);

  if (chosen === q.answer) {
    btn.classList.add('correct');
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback correct';
    blank.textContent = q.answer;
    blank.style.borderColor = '#00C896';
    blank.style.color = '#00C896';
    if (!answered[id]) correctCount++;
  } else {
    btn.classList.add('wrong');
    fb.textContent = `✗ Try again! The answer is "${q.answer}".`;
    fb.className = 'feedback wrong';
    blank.textContent = q.answer;
    blank.style.borderColor = '#FF6B6B';
    blank.style.color = '#FF6B6B';
    // Highlight correct btn
    allBtns.forEach(b => {
      if (b.textContent === q.answer) b.classList.add('correct');
    });
  }

  answered[id] = true;
  updateScore();
}

function updateScore() {
  const total = questions.length;
  const score = correctCount;
  document.getElementById('score').textContent = score;
  document.getElementById('total').textContent = Object.keys(answered).length;
  document.getElementById('progress-fill').style.width = (Object.keys(answered).length / total * 100) + '%';
}

function resetAll() {
  Object.keys(answered).forEach(k => delete answered[k]);
  correctCount = 0;
  buildCards();
}

buildCards();
</script>
</body>
</html>
