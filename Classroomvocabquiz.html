<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Vocabulary Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #3B82F6;
    --blue-dark: #1D4ED8;
    --blue-light: #EFF6FF;
    --green: #22C55E;
    --green-dark: #15803D;
    --red: #EF4444;
    --red-dark: #B91C1C;
    --yellow: #FBBF24;
    --cream: #FFF8F0;
    --navy: #1E3A5F;
    --gray: #64748B;
    --light: #F1F5F9;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── HEADER ─── */
  header {
    width: 100%;
    background: var(--blue);
    padding: 18px 24px 14px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(59,130,246,0.3);
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: white;
    letter-spacing: 0.5px;
  }
  header p {
    color: rgba(255,255,255,0.85);
    font-size: 0.9rem;
    margin-top: 2px;
  }

  /* ─── PROGRESS BAR ─── */
  #progress-wrap {
    width: 100%;
    max-width: 680px;
    padding: 16px 20px 0;
  }
  #progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }
  #progress-bar-outer {
    height: 10px;
    background: #DBEAFE;
    border-radius: 999px;
    overflow: hidden;
  }
  #progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), #60A5FA);
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ─── SECTION BADGE ─── */
  .section-badge {
    display: inline-block;
    background: var(--yellow);
    color: var(--navy);
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    padding: 4px 14px;
    border-radius: 999px;
    margin: 14px 0 6px;
  }

  /* ─── QUESTION CARD ─── */
  #quiz-wrap {
    width: 100%;
    max-width: 680px;
    padding: 0 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .question-card {
    background: white;
    border-radius: 20px;
    padding: 28px 28px 24px;
    width: 100%;
    box-shadow: 0 6px 24px rgba(30,58,95,0.10);
    animation: cardIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .q-number {
    font-size: 0.78rem;
    font-weight: 800;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .q-text {
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 18px;
    line-height: 1.3;
  }

  .q-image-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
  }
  .q-image-wrap img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    border-radius: 16px;
    background: var(--blue-light);
    padding: 12px;
    border: 2px solid #DBEAFE;
  }

  /* ─── OPTIONS GRID ─── */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 400px) {
    .options-grid { grid-template-columns: 1fr; }
  }

  .opt-btn {
    background: var(--light);
    border: 2.5px solid #E2E8F0;
    border-radius: 14px;
    padding: 14px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: center;
    line-height: 1.3;
  }
  .opt-btn:hover:not(:disabled) {
    background: var(--blue-light);
    border-color: var(--blue);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(59,130,246,0.18);
  }
  .opt-btn.correct {
    background: #DCFCE7;
    border-color: var(--green);
    color: var(--green-dark);
  }
  .opt-btn.wrong {
    background: #FEE2E2;
    border-color: var(--red);
    color: var(--red-dark);
  }
  .opt-btn:disabled { cursor: default; }

  /* ─── FEEDBACK ─── */
  #feedback {
    margin-top: 16px;
    padding: 12px 18px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.95rem;
    text-align: center;
    display: none;
  }
  #feedback.show { display: block; }
  #feedback.correct { background: #DCFCE7; color: var(--green-dark); }
  #feedback.wrong   { background: #FEE2E2; color: var(--red-dark); }

  /* ─── NEXT BUTTON ─── */
  #next-btn {
    display: none;
    margin-top: 18px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 36px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.18s;
    align-self: center;
    box-shadow: 0 4px 14px rgba(59,130,246,0.35);
  }
  #next-btn:hover {
    background: var(--blue-dark);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(59,130,246,0.4);
  }
  #next-btn.show { display: block; }

  /* ─── RESULTS ─── */
  #results-card {
    display: none;
    background: white;
    border-radius: 20px;
    padding: 36px 28px;
    width: 100%;
    box-shadow: 0 6px 24px rgba(30,58,95,0.10);
    text-align: center;
    animation: cardIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  #results-card.show { display: block; }

  .result-emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .result-score {
    font-size: 3.2rem;
    font-weight: 900;
    color: var(--blue);
    margin: 12px 0;
  }
  .result-sub {
    color: var(--gray);
    font-size: 0.95rem;
    margin-bottom: 24px;
  }
  .score-breakdown {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .score-pill {
    background: var(--light);
    border-radius: 12px;
    padding: 10px 20px;
    font-weight: 700;
    color: var(--navy);
    font-size: 0.9rem;
  }
  .score-pill span {
    display: block;
    font-size: 1.4rem;
    color: var(--blue);
  }

  #restart-btn {
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 36px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 4px 14px rgba(59,130,246,0.35);
  }
  #restart-btn:hover {
    background: var(--blue-dark);
    transform: translateY(-2px);
  }

  footer {
    margin-top: auto;
    padding: 16px;
    font-size: 0.78rem;
    color: var(--gray);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>🏫 Classroom Vocabulary Quiz</h1>
  <p>20 questions &bull; Names &amp; Colours</p>
</header>

<div id="progress-wrap">
  <div id="progress-info">
    <span id="q-counter">Question 1 of 20</span>
    <span id="score-display">Score: 0</span>
  </div>
  <div id="progress-bar-outer">
    <div id="progress-bar-inner"></div>
  </div>
</div>

<div id="quiz-wrap">
  <div id="section-label"></div>

  <div class="question-card" id="question-card" style="display:none">
    <div class="q-number" id="q-number"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-image-wrap" id="q-image-wrap"></div>
    <div class="options-grid" id="options-grid"></div>
    <div id="feedback"></div>
  </div>

  <button id="next-btn" onclick="nextQuestion()">Next →</button>

  <div id="results-card">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title">Quiz Complete!</div>
    <div class="result-score" id="result-score"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="score-breakdown">
      <div class="score-pill">📚 Names<span id="names-score"></span></div>
      <div class="score-pill">🎨 Colours<span id="colours-score"></span></div>
    </div>
    <button id="restart-btn" onclick="startQuiz()">Try Again 🔄</button>
  </div>
</div>

<footer>Classroom Vocabulary &bull; ESL Activity</footer>

// ─── STATE ───────────────────────────────────────────────────
let questions = [];
let current = 0;
let score = 0;
let namesScore = 0;
let coloursScore = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  // Shuffle vocab Qs (names first 12, then colours)
  const nameQs = shuffle(VOCAB_QS.filter(q => q.type === "name"));
  const colourQs = shuffle(VOCAB_QS.filter(q => q.type === "colour"));
  questions = [...nameQs, ...colourQs];
  current = 0;
  score = 0;
  namesScore = 0;
  coloursScore = 0;
  answered = false;
  document.getElementById("results-card").classList.remove("show");
  document.getElementById("question-card").style.display = "block";
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  answered = false;

  // Progress
  const pct = (current / questions.length) * 100;
  document.getElementById("progress-bar-inner").style.width = pct + "%";
  document.getElementById("q-counter").textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById("score-display").textContent = `Score: ${score}`;

  // Section badge
  const badge = document.getElementById("section-label");
  if (current === 0) {
    badge.innerHTML = '<div class="section-badge">📚 Part 1 — Names</div>';
  } else if (current === 12) {
    badge.innerHTML = '<div class="section-badge">🎨 Part 2 — Colours</div>';
  } else {
    badge.innerHTML = "";
  }

  // Q number
  document.getElementById("q-number").textContent = `Question ${current + 1} of ${questions.length}`;

  // Q text
  document.getElementById("q-text").textContent = q.question;

  // Image
  const imgWrap = document.getElementById("q-image-wrap");
  imgWrap.innerHTML = `<img src="${IMAGES[q.image]}" alt="classroom object">`;

  // Options (shuffle display order)
  const grid = document.getElementById("options-grid");
  grid.innerHTML = "";
  const shuffled = shuffle(q.options);
  shuffled.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, opt, q.answer, q.type);
    grid.appendChild(btn);
  });

  // Reset feedback
  const fb = document.getElementById("feedback");
  fb.className = "";
  fb.textContent = "";

  // Hide next
  const nb = document.getElementById("next-btn");
  nb.className = "";
}

function selectAnswer(btn, selected, correct, type) {
  if (answered) return;
  answered = true;

  // Disable all
  document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);

  const fb = document.getElementById("feedback");
  const nb = document.getElementById("next-btn");

  if (selected === correct) {
    btn.classList.add("correct");
    score++;
    if (type === "name") namesScore++;
    else coloursScore++;
    fb.textContent = "✅ Correct! Well done!";
    fb.className = "show correct";
  } else {
    btn.classList.add("wrong");
    // Highlight correct
    document.querySelectorAll(".opt-btn").forEach(b => {
      if (b.textContent === correct) b.classList.add("correct");
    });
    fb.textContent = `❌ Not quite! The answer is: ${correct}`;
    fb.className = "show wrong";
  }

  document.getElementById("score-display").textContent = `Score: ${score}`;

  nb.textContent = current < questions.length - 1 ? "Next →" : "See Results 🎉";
  nb.className = "show";
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  document.getElementById("question-card").style.display = "none";
  document.getElementById("section-label").innerHTML = "";
  document.getElementById("next-btn").className = "";
  document.getElementById("progress-bar-inner").style.width = "100%";

  const pct = Math.round((score / questions.length) * 100);
  let emoji = pct >= 90 ? "🏆" : pct >= 70 ? "🌟" : pct >= 50 ? "👍" : "💪";
  let msg = pct >= 90 ? "Outstanding work!" : pct >= 70 ? "Great job!" : pct >= 50 ? "Good effort!" : "Keep practising!";

  document.getElementById("result-emoji").textContent = emoji;
  document.getElementById("result-score").textContent = `${score} / ${questions.length}`;
  document.getElementById("result-sub").textContent = `${pct}% — ${msg}`;
  document.getElementById("names-score").textContent = `${namesScore} / 12`;
  document.getElementById("colours-score").textContent = `${coloursScore} / 8`;

  const card = document.getElementById("results-card");
  card.classList.add("show");
  document.getElementById("q-counter").textContent = "Quiz Complete!";
}

// ─── INIT ────────────────────────────────────────────────────
startQuiz();
</script>
</body>
</html>
